<div class="menu-overlay" #menuOverlay (click)="closeMenu()">
  <div class="menu-wrapper" #menuWrapper (click)="$event.stopPropagation()">
    
    <!-- Drag Handle with Reference -->
    <div class="drag-handle-container" #dragHandle>
      <div class="drag-handle"></div>
      <p class="drag-label">ปัดลงเพื่อปิด</p>
    </div>

    <div class="menu-grid">
      <ion-grid>
        <ion-row>
          <ng-container *ngFor="let m of filterMenu()">
            <ion-col size="4">
              <div
                class="menu-card"
                [class.selected]="selected() === m.key"
                (click)="onSelect(m.key, m.user_id ?? null)"
              >
                <ion-icon [name]="m.icon"></ion-icon>
                <p>{{ m.label }}</p>
              </div>
            </ion-col>
          </ng-container>
        </ion-row>
      </ion-grid>
    </div>
  </div>
</div>
