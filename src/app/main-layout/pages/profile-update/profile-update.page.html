<ion-content [fullscreen]="true" class="profile-content minimal-style">
  <div class="background-container"></div>

  <div class="content-wrapper">
    <div class="profile-header">
      <div class="avatar-placeholder">
        <ion-icon name="person"></ion-icon>
      </div>
      <h1 class="page-title">แก้ไขข้อมูลส่วนตัว</h1>
      <div class="username-badge">
        <p class="user-handle">{{ user()?.USERNAME || 'กำลังโหลด...' }}</p>
      </div>
    </div>

    <form [formGroup]="updateForm" (ngSubmit)="update()" class="info-section">
      <ion-list lines="none" class="minimal-list">
        <ion-item class="highlight-item">
          <ion-icon name="person-outline" slot="start"></ion-icon>
          <ion-label position="stacked">ชื่อผู้ใช้</ion-label>
          <ion-input
            type="text"
            placeholder="Username"
            formControlName="username"
          ></ion-input>
        </ion-item>

        <ion-item>
          <ion-icon name="call-outline" slot="start" class="!mt-[2.3rem]"></ion-icon>
          <ion-label position="stacked">เบอร์โทรศัพท์</ion-label>
          <ion-input
            type="tel"
            placeholder="0xx-xxx-xxxx"
            formControlName="phone_number"
          ></ion-input>
        </ion-item>
      </ion-list>

      <div class="save-section">
        <ion-button
          expand="block"
          fill="solid"
          class="save-btn"
          type="submit"
          [disabled]="updateForm.invalid"
        >
          บันทึกข้อมูล
        </ion-button>
      </div>
    </form>

    <div class="bottom-spacer"></div>
  </div>

  <ion-toast
    [isOpen]="succMsg() !== null"
    [message]="succMsg()"
    [duration]="5000"
    color="success"
    position="bottom"
  ></ion-toast>
  <ion-toast
    [isOpen]="errMsg() !== null"
    [message]="errMsg()"
    [duration]="5000"
    color="danger"
    position="bottom"
  ></ion-toast>
</ion-content>
