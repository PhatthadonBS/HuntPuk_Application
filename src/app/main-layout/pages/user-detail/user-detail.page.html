<ion-content [fullscreen]="true" class="ion-padding profile-content minimal-style">
  <div class="profile-header">
    <div class="avatar-placeholder">
      <ion-icon name="person-circle-outline"></ion-icon>
    </div>
    <h1 class="page-title">Profile</h1>
    <p class="user-handle">{{ user()?.USERNAME || 'Loading...' }}</p>
  </div>

  <div class="info-section">
    <ion-list lines="full" class="minimal-list">
      <ion-item>
        <ion-icon name="person-outline" slot="start" color="medium"></ion-icon>
        <ion-label position="stacked" color="medium">Username</ion-label>
        <ion-input type="text" [value]="user()?.USERNAME" readonly></ion-input>
      </ion-item>

      <ion-item>
        <ion-icon name="mail-outline" slot="start" color="medium"></ion-icon>
        <ion-label position="stacked" color="medium">Email</ion-label>
        <ion-input type="email" [value]="user()?.EMAIL" readonly></ion-input>
      </ion-item>

      <ion-item>
        <ion-icon name="call-outline" slot="start" color="medium"></ion-icon>
        <ion-label position="stacked" color="medium">Phone</ion-label>
        <ion-input type="tel" [value]="user()?.PHONE_NUMBER" readonly></ion-input>
      </ion-item>
    </ion-list>
  </div>

  <div class="action-section">
    <ion-list lines="none" class="minimal-list action-list">
      <ion-item button (click)="profileUpdate()" detail="true">
        <ion-icon name="create-outline" slot="start" color="primary"></ion-icon>
        <ion-label>Edit Profile</ion-label>
      </ion-item>
      
      <ion-item button (click)="resetPasswd()" detail="true">
        <ion-icon name="lock-closed-outline" slot="start" color="primary"></ion-icon>
        <ion-label>Change Password</ion-label>
      </ion-item>

      <ion-item button (click)="deleteAccount()" detail="true">
        <ion-icon name="trash-outline" slot="start" color="danger"></ion-icon>
        <ion-label color="danger">Delete Account</ion-label>
      </ion-item>
    </ion-list>
  </div>

  <div class="logout-section">
    <ion-button expand="block" fill="outline" color="medium" class="logout-btn" (click)="logout()">
      Sign Out
    </ion-button>
  </div>

  <ion-toast
    [isOpen]="succMsg() !== null"
    [message]="succMsg()"
    [duration]="5000"
    color="success"
    position="bottom"
  ></ion-toast>
  <ion-toast
    [isOpen]="errMsg() !== null"
    [message]="errMsg()"
    [duration]="5000"
    color="danger"
    position="bottom"
  ></ion-toast>
</ion-content>
