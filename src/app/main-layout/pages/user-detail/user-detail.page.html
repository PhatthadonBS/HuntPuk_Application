<ion-header>
  <ion-toolbar class="main-toolbar">
    <div
      class="header-tool flex justify-between align-middle text-lg font-bold"
    >
      <a
        (click)="goBack()"
        class="back-btn flex justify-between align-middle ml-[.25rem] p-[.25rem] pl-1 pr-3 w-[5rem] rounded-full bg-slate-100"
      >
        <ion-icon name="arrow-back-circle-outline" size="large"></ion-icon>
        <span class="">กลับ</span>
      </a>
      <span class="mt-1 text-white mr-[1rem] text-xl">บัญชีของฉัน</span>
    </div>
  </ion-toolbar>
</ion-header>

<ion-content [fullscreen]="true" class="profile-content minimal-style">
  <div class="background-container"></div>

  <div class="content-wrapper">
    <div class="profile-header">
      <div class="avatar-placeholder">
        <ion-icon name="person" color="medium"></ion-icon>
      </div>
      <h1 class="page-title">ข้อมูลส่วนบุคคล</h1>
      <div class="username-badge">
        <p class="user-handle">{{ user()?.USERNAME || 'กำลังโหลด...' }}</p>
      </div>
    </div>

    <div class="info-section">
      <ion-list lines="none" class="minimal-list">
        <ion-item class="highlight-item">
          <ion-icon
            name="person-outline"
            slot="start"
            color="medium"
          ></ion-icon>
          <ion-label position="stacked">ชื่อผู้ใช้</ion-label>
          <ion-input
            type="text"
            [value]="user()?.USERNAME"
            readonly
          ></ion-input>
        </ion-item>

        <ion-item>
          <ion-icon name="mail-outline" slot="start" color="medium"></ion-icon>
          <ion-label position="stacked">อีเมล</ion-label>
          <ion-input type="email" [value]="user()?.EMAIL" readonly></ion-input>
        </ion-item>

        <ion-item>
          <ion-icon name="call-outline" slot="start" color="medium"></ion-icon>
          <ion-label position="stacked">เบอร์โทรศัพท์</ion-label>
          <ion-input
            type="tel"
            [value]="user()?.PHONE_NUMBER"
            readonly
          ></ion-input>
        </ion-item>
      </ion-list>
    </div>

    <div class="action-section" *ngIf="isOwnProfile() || isAdmin()">
      <ion-list lines="none" class="minimal-list action-list">
        <ion-item button (click)="profileUpdate()" detail="true">
          <ion-icon
            name="create-outline"
            slot="start"
            color="medium"
          ></ion-icon>
          <ion-label>แก้ไขข้อมูลส่วนตัว</ion-label>
        </ion-item>

        <ion-item button (click)="resetPasswd()" detail="true">
          <ion-icon
            name="lock-closed-outline"
            slot="start"
            color="medium"
          ></ion-icon>
          <ion-label>เปลี่ยนรหัสผ่าน</ion-label>
        </ion-item>

        <ion-item
          *ngIf="isOwnProfile() && !isAdmin()"
          button
          (click)="deleteAccount()"
          detail="true"
          class="delete-item"
        >
          <ion-icon name="trash-outline" slot="start" color="danger"></ion-icon>
          <ion-label>ลบบัญชี</ion-label>
        </ion-item>

        <div class="logout-container" *ngIf="isOwnProfile()">
          <ion-button
            expand="block"
            fill="solid"
            class="logout-btn"
            (click)="logout()"
          >
            ออกจากระบบ
          </ion-button>
        </div>
      </ion-list>
    </div>

    <div class="bottom-spacer"></div>
  </div>

  <ion-toast
    [isOpen]="succMsg() !== null"
    [message]="succMsg()"
    [duration]="5000"
    color="success"
    position="bottom"
  ></ion-toast>
  <ion-toast
    [isOpen]="errMsg() !== null"
    [message]="errMsg()"
    [duration]="5000"
    color="danger"
    position="bottom"
  ></ion-toast>

  <app-loading-ui *ngIf="isLoading()"></app-loading-ui>
</ion-content>
