<ion-header class="ion-no-border main-header">
  <ion-toolbar class="main-toolbar">
    <div
      class="header-tool flex justify-between align-middle text-lg font-bold"
    >
      <a
        (click)="goBack()"
        class="back-btn flex justify-between align-middle ml-[.25rem] p-[.25rem] pl-1 pr-3 w-[5rem] rounded-full bg-slate-100"
      >
        <ion-icon
          name="arrow-back-circle-outline"
          size="large"
          color="dark"
        ></ion-icon>
        <span>กลับ</span>
      </a>
      <span class="mt-1 text-white mr-[1rem] text-xl">รายการโปรด</span>
    </div>
  </ion-toolbar>
</ion-header>

<ion-content [fullscreen]="true" class="minimal-content">
  <ion-refresher slot="fixed" (ionRefresh)="handleRefresh($event)">
    <ion-refresher-content></ion-refresher-content>
  </ion-refresher>

  <div class="background"></div>

  <!-- Empty State -->
  <div class="empty-state" *ngIf="!isLoading() && favorites().length === 0">
    <div class="empty-content">
      <div class="empty-icon-wrapper">
        <ion-icon name="bookmark-outline"></ion-icon>
      </div>
      <h3>ยังไม่มีรายการโปรด</h3>
      <p>คุณยังไม่ได้บันทึกหอพักใดๆ ในรายการโปรด</p>
      <ion-button shape="round" color="primary" (click)="goToDormList()">
        ค้นหาหอพัก
      </ion-button>
    </div>
  </div>

  <!-- Favorites List -->
  <div
    *ngIf="!isLoading() && favorites().length > 0"
    class="fav-list-container"
  >
    <div class="list-header">
      <span class="count-badge">{{ favorites().length }} รายการโปรด</span>
    </div>

    <div
      class="minimal-fav-card"
      *ngFor="let dorm of favorites()"
      [class.is-selected]="selectedDormIds().includes(dorm.DORMID)"
    >
      <ion-checkbox
        slot="start"
        [checked]="selectedDormIds().includes(dorm.DORMID)"
        (ionChange)="toggleSelection(dorm.DORMID, $event)"
        mode="ios"
        class="minimal-checkbox"
      ></ion-checkbox>

      <div class="card-body" (click)="goToDetail(dorm.DORMID)">
        <div class="image-wrapper">
          <img
            #dormImg
            [src]="dorm.COVERIMAGE"
            *ngIf="dorm.COVERIMAGE"
            (error)="dormImg.src = 'https://placehold.co/600x400?text=No+Image'"
          />
          <div class="no-img" *ngIf="!dorm.COVERIMAGE">
            <ion-icon name="home-outline"></ion-icon>
          </div>
        </div>

        <div class="dorm-info">
          <h2>{{ dorm.DORMNAME }}</h2>
          <span class="text-sm text-gray-500"
            ><ion-icon name="location-outline"></ion-icon> {{
            dorm.ZONE_NAME}}</span
          >
        </div>
      </div>

      <ion-button
        (click)="removeFavorite(dorm.DORMID); $event.stopPropagation()"
        fill="clear"
        color="medium"
        class="remove-btn"
      >
        <ion-icon name="trash-outline" slot="icon-only"></ion-icon>
      </ion-button>
    </div>
  </div>

  <div class="h-5"></div>
</ion-content>

<ion-footer
  class="ion-no-border minimal-footer pb-4"
  *ngIf="selectedDormIds().length > 0"
>
  <div class="p-4">
    <ion-button
      expand="block"
      color="primary"
      (click)="confirmComparison()"
      [disabled]="selectedDormIds().length < 2"
    >
      <span class="!text-[16px]"
        >เปรียบเทียบ {{ selectedDormIds().length }} รายการ</span
      >
    </ion-button>
  </div>
</ion-footer>

<app-loading-ui *ngIf="isLoading()"></app-loading-ui>
