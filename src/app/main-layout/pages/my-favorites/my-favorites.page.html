<ion-header class="ion-no-border">
  <ion-toolbar class="main-toolbar">
    <ion-buttons slot="start">
      <ion-back-button defaultHref="/home" icon="arrow-back-circle-outline" color="primary"></ion-back-button>
    </ion-buttons>
    <ion-title class="font-bold">รายการโปรดของฉัน</ion-title>
    <ion-buttons slot="end" *ngIf="selectedDormIds().length > 0">
      <ion-button fill="clear" (click)="selectedDormIds.set([])" color="medium">
        <ion-icon name="close-outline" slot="icon-only"></ion-icon>
      </ion-button>
    </ion-buttons>
  </ion-toolbar>
</ion-header>

<ion-content [fullscreen]="true" class="bg-gray-50">
  <div class="flex flex-col items-center justify-center py-20 px-10 text-center" *ngIf="!isLoading() && favorites().length === 0">
    <div class="w-20 h-20 bg-gray-100 rounded-full flex items-center justify-center mb-4">
      <ion-icon name="bookmark-outline" class="text-4xl text-gray-300"></ion-icon>
    </div>
    <h2 class="text-xl font-bold text-gray-700 mb-2">ยังไม่มีรายการโปรด</h2>
    <p class="text-gray-400">หอพักที่คุณถูกใจจะมาปรากฏที่นี่</p>
    <ion-button fill="clear" routerLink="/home" class="mt-4">ไปเลือกดูหอพัก</ion-button>
  </div>

  <ion-list class="bg-transparent" *ngIf="!isLoading() && favorites().length > 0">
    <div class="px-4 py-2 text-xs font-bold text-gray-500 uppercase tracking-wider">
      {{ favorites().length }} รายการโปรด
    </div>

    <ion-item *ngFor="let dorm of favorites()" class="mb-2 mx-2 rounded-2xl shadow-sm border border-gray-100 overflow-hidden" lines="none">
      <ion-checkbox slot="start" 
        [checked]="selectedDormIds().includes(dorm.DORMID)"
        (ionChange)="toggleSelection(dorm.DORMID, $event)"
        class="mr-2"
      ></ion-checkbox>

      <div slot="start" class="w-10 h-10 bg-gray-100 rounded-full flex items-center justify-center mr-2">
        <ion-icon name="home-outline" class="text-xl text-primary"></ion-icon>
      </div>

      <ion-label (click)="goToDetail(dorm.DORMID)">
        <h2 class="font-bold text-gray-800 text-base leading-tight">{{ dorm.DORMNAME }}</h2>
      </ion-label>

      <ion-button slot="end" fill="clear" color="danger" (click)="removeFavorite(dorm.DORMID)">
        <ion-icon name="trash-outline" slot="icon-only"></ion-icon>
      </ion-button>
    </ion-item>
  </ion-list>

  <div class="h-20"></div>
</ion-content>

<ion-footer class="ion-no-border bg-transparent p-4" *ngIf="selectedDormIds().length > 0">
  <ion-button expand="block" (click)="confirmComparison()" class="h-14 rounded-2xl shadow-lg font-bold" [disabled]="selectedDormIds().length < 2">
    <ion-icon name="git-compare-outline" slot="start"></ion-icon>
    เปรียบเทียบ {{ selectedDormIds().length }} แห่ง
    <span slot="end" class="ml-2 text-xs font-normal" *ngIf="selectedDormIds().length < 2">(เลือกอย่างน้อย 2)</span>
  </ion-button>
</ion-footer>

<app-loading-ui *ngIf="isLoading()"></app-loading-ui>
