<ion-header class="ion-no-border dorm-list-header">
  <app-filter-group 
    [zones]="zones()" 
    [showCompare]="false"
    [showBack]="false"
    [initialParams]="initialParams()"
    [openFilterOnLoad]="autoOpenFilter()"
    (filterApplied)="handleFilterApplied($event)"
  ></app-filter-group>
</ion-header>

<ion-content [fullscreen]="true" class="dorm-list-content">
  <div class="background-container"></div>

  <div class="content-wrapper">
    <div class="header-section">
      <h1 class="page-title">ค้นหาหอพัก</h1>
    </div>

    <div class="results-section">
      <div class="results-info" *ngIf="allDorms().length > 0">
        <p>พบหอพัก <strong>{{ filteredDorms().length }}</strong> แห่ง</p>
      </div>

      <ion-grid class="ion-no-padding">
        <ion-row>
          <ion-col size="12" size-md="6" *ngFor="let dorm of filteredDorms()">
            <ion-card class="dorm-card" mode="ios">
              <div class="img-wrapper">
                <img #dormImg 
                     [src]="dorm.image || 'https://placehold.co/400x300?text=No+Image'" 
                     alt="Dorm Image" 
                     class="dorm-img"
                     (error)="dormImg.src = 'https://placehold.co/400x300?text=No+Image'" />
                <div class="score-badge">
                  <ion-icon name="star" color="warning"></ion-icon>
                  <span>{{ dorm.SCORE | number:'1.1-1' }}</span>
                </div>
              </div>
              
              <ion-card-content>
                <h2 class="dorm-name">{{ dorm.DORM_NAME }}</h2>
                
                <div class="info-row">
                  <ion-icon name="location-outline" color="medium"></ion-icon>
                  <span class="info-text">{{ dorm.zone }}</span>
                </div>
                
                <div class="info-row price-row">
                  <ion-icon name="cash-outline" color="success"></ion-icon>
                  <span class="price-text">เริ่มต้น {{ dorm.start_price | number }} บาท/เดือน</span>
                </div>
              </ion-card-content>
            </ion-card>
          </ion-col>
        </ion-row>
      </ion-grid>

      <div class="empty-state" *ngIf="allDorms().length > 0 && filteredDorms().length === 0">
        <ion-icon name="search-outline" color="medium"></ion-icon>
        <h3>ไม่พบหอพักที่ตรงกับเงื่อนไข</h3>
        <p>ลองปรับเปลี่ยนการค้นหา หรือตัวกรองของคุณ</p>
        <ion-button fill="clear" (click)="clearFilters()">ล้างการค้นหา</ion-button>
      </div>
    </div>
    
    <div class="bottom-spacer"></div>
  </div>
</ion-content>
