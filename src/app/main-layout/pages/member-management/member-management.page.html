<ion-header class="ion-no-border main-header">
  <ion-toolbar class="main-toolbar">
    <div
      class="header-tool flex justify-between align-middle text-lg font-bold"
    >
      <a
        routerLink="/"
        class="back-btn flex justify-between align-middle ml-[.25rem] p-[.25rem] pl-1 pr-3 w-[5rem] rounded-full bg-slate-100 no-underline text-black"
      >
        <ion-icon name="arrow-back-circle-outline" size="large"></ion-icon>
        <span class="">กลับ</span>
      </a>
      <span class="mt-1 text-white mr-[1rem] text-xl">จัดการสมาชิก</span>
    </div>
  </ion-toolbar>
</ion-header>

<ion-content
  [fullscreen]="true"
  class="member-list-content"
  [scrollEvents]="true"
  (ionScroll)="onScroll($event)"
>
  <ion-refresher slot="fixed" (ionRefresh)="handleRefresh($event)">
    <ion-refresher-content></ion-refresher-content>
  </ion-refresher>

  <div class="background-container"></div>

  <div class="content-wrapper">
    <!-- Search and Tabs wrapper -->
    <div class="filter-relative-wrapper flex flex-col gap-4">
      <div class="filter-group-container">
        <div class="minimal-search-container mt-0">
          <ion-searchbar
            placeholder="ค้นหาผู้ใช้งาน..."
            [debounce]="300"
            (ionInput)="onSearch($event)"
            class="minimal-searchbar"
            mode="ios"
          >
          </ion-searchbar>
        </div>
      </div>

      <div class="filter-group-container">
        <ion-segment
          [value]="selectedTab()"
          (ionChange)="onTabChange($event)"
          mode="ios"
          class="minimal-segment"
        >
          <ion-segment-button value="member">
            <ion-label>สมาชิก</ion-label>
          </ion-segment-button>
          <ion-segment-button value="owner">
            <ion-label>เจ้าของหอพัก</ion-label>
          </ion-segment-button>
        </ion-segment>
      </div>
    </div>

    <!-- User List -->
    <div class="results-count-wrapper" *ngIf="filteredUsers().length > 0">
      <div class="count-badge">
        <span
          >พบผู้ใช้งาน <strong>{{ filteredUsers().length }}</strong> คน</span
        >
      </div>
    </div>

    <div class="member-list-container">
      <div
        *ngFor="let user of filteredUsers()"
        (click)="goToDetail(user)"
        class="minimal-member-card"
      >
        <div class="minimal-card-inner">
          <div class="flex items-center gap-4">
            <div class="avatar-container">
              <ion-badge
                [color]="getStatusColor(user.ACCOUNT_STATUS)"
                mode="ios"
                class="minimal-badge absolute -top-2 -left-2 shadow-sm z-10 scale-90 origin-top-left"
              >
                {{ getStatusText(user.ACCOUNT_STATUS) }}
              </ion-badge>

              <ion-icon
                [name]="user.ROLE_TYPE_ID === 1 ? 'person-circle-outline' : 'business-outline'"
                class="text-3xl text-gray-600"
                [style.display]="user.PROFILE_IMAGE ? 'none' : 'inline-block'"
              ></ion-icon>

              <img
                *ngIf="user.PROFILE_IMAGE"
                [src]="user.PROFILE_IMAGE"
                class="w-full h-full object-cover rounded-xl"
                alt="Profile Image"
                (error)="$any($event.target).style.display = 'none'; $any($event.target).previousElementSibling.style.display = 'inline-block'"
              />
              <div
                class="role-indicator"
                [class.is-owner]="user.ROLE_TYPE_ID === 2"
              ></div>
            </div>

            <div class="flex-1 min-w-0 pl-1">
              <h2 class="text-lg font-bold text-gray-900 truncate m-0">
                <ng-container *ngIf="selectedTab() === 'member'">
                  {{ user.USERNAME }}
                </ng-container>
                <ng-container *ngIf="selectedTab() === 'owner'">
                  {{ user.FIRST_NAME }} {{ user.LAST_NAME }}
                </ng-container>
              </h2>
              <p class="text-sm text-gray-500 truncate">{{ user.EMAIL }}</p>
            </div>

            <div class="flex flex-col items-end justify-center">
              <ion-button
                (click)="openManageActionSheet($event, user)"
                fill="clear"
                color="medium"
                size="small"
                class="m-0 h-auto p-0 action-btn"
              >
                <ion-icon name="settings-outline" slot="start"></ion-icon>
                จัดการ
              </ion-button>
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- Empty State -->
    <div
      class="empty-state"
      *ngIf="filteredUsers().length === 0 && !isLoading()"
    >
      <div class="empty-content">
        <div class="empty-icon-wrapper">
          <ion-icon name="person-circle-outline"></ion-icon>
        </div>
        <h3>ไม่พบข้อมูล</h3>
        <p>ไม่พบผู้ใช้งานที่ตรงกับคำค้นหาของคุณ</p>
      </div>
    </div>

    <div class="bottom-spacer"></div>
  </div>

  <ion-fab
    vertical="bottom"
    horizontal="end"
    slot="fixed"
    *ngIf="showScrollBtn()"
  >
    <ion-fab-button (click)="scrollToTop()" class="scroll-top-btn">
      <ion-icon name="arrow-up-outline"></ion-icon>
    </ion-fab-button>
  </ion-fab>
</ion-content>
