<ion-header class="ion-no-border premium-header">
  <ion-toolbar>
    <ion-buttons slot="start">
      <ion-back-button defaultHref="/" color="light"></ion-back-button>
    </ion-buttons>
    <ion-title class="font-bold text-white">Member Control</ion-title>
  </ion-toolbar>

  <div class="px-5 pb-6">
    <div class="premium-search-container">
      <ion-searchbar 
        placeholder="Search for users..." 
        [debounce]="300" 
        (ionInput)="onSearch($event)"
        class="premium-searchbar"
        mode="ios">
      </ion-searchbar>
    </div>

    <ion-segment [value]="selectedTab()" (ionChange)="onTabChange($event)" mode="ios" class="mt-4 premium-segment">
      <ion-segment-button value="member">
        <ion-label>Members</ion-label>
      </ion-segment-button>
      <ion-segment-button value="owner">
        <ion-label>Dorm Owners</ion-label>
      </ion-segment-button>
    </ion-segment>
  </div>
</ion-header>

<ion-content [fullscreen]="true" class="premium-content">
  <div class="px-4 pt-6 pb-20">
    <div *ngIf="filteredUsers().length === 0 && !isLoading()" class="flex flex-col items-center justify-center py-20 text-center">
      <div class="w-24 h-24 bg-gray-100 rounded-full flex items-center justify-center mb-4">
        <ion-icon name="person-circle-outline" class="text-6xl text-gray-300"></ion-icon>
      </div>
      <h3 class="text-xl font-bold text-gray-800">No matches found</h3>
      <p class="text-gray-400 mt-2 px-10">We couldn't find any users matching your search criteria.</p>
    </div>

    <div class="grid grid-cols-1 gap-4">
      <div *ngFor="let user of filteredUsers()" (click)="goToDetail(user)" class="premium-card">
        <div class="premium-card-inner">
          <div class="flex items-center gap-4">
            <div class="avatar-container">
              <ion-icon [name]="user.ROLE_TYPE_ID === 1 ? 'person-circle-outline' : 'business-outline'" class="text-3xl text-primary"></ion-icon>
              <div class="role-indicator" [class.is-owner]="user.ROLE_TYPE_ID === 2"></div>
            </div>
            
            <div class="flex-1 min-w-0">
              <h2 class="text-lg font-bold text-gray-900 truncate m-0">
                <ng-container *ngIf="selectedTab() === 'member'">
                  {{ user.USERNAME }}
                </ng-container>
                <ng-container *ngIf="selectedTab() === 'owner'">
                  {{ user.FIRST_NAME }} {{ user.LAST_NAME }}
                </ng-container>
              </h2>
              <p class="text-sm text-gray-500 truncate">{{ user.EMAIL }}</p>
            </div>

            <div class="status-indicator">
              <ion-badge [color]="getStatusColor(user.ACCOUNT_STATUS)" mode="ios" class="premium-badge">
                {{ getStatusText(user.ACCOUNT_STATUS) }}
              </ion-badge>
            </div>
          </div>

          <div class="premium-actions mt-4 pt-4 flex justify-end gap-3 border-t border-gray-50">
            <ion-button (click)="editUser($event, user)" fill="clear" class="action-btn edit" size="small">
              <ion-icon slot="start" name="create-outline"></ion-icon>
              Edit
            </ion-button>
            
            <ion-button (click)="banUser($event, user)" fill="solid" color="danger" class="action-btn ban" size="small" *ngIf="user.ACCOUNT_STATUS !== 2">
              <ion-icon slot="start" name="ban-outline"></ion-icon>
              Ban
            </ion-button>

            <ion-button (click)="unbanUser($event, user)" fill="solid" color="success" class="action-btn unban" size="small" *ngIf="user.ACCOUNT_STATUS === 2">
              <ion-icon slot="start" name="shield-checkmark-outline"></ion-icon>
              Unban User
            </ion-button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <ion-fab vertical="bottom" horizontal="end" slot="fixed">
    <ion-fab-button (click)="scrollToTop()" class="premium-fab">
      <ion-icon name="arrow-up-outline"></ion-icon>
    </ion-fab-button>
  </ion-fab>
</ion-content>
