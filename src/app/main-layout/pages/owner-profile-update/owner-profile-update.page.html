<ion-header class="ion-no-border main-header">
  <ion-toolbar class="main-toolbar">
    <div
      class="header-tool flex justify-between align-middle text-lg font-bold"
    >
      <a
        (click)="goBack()"
        class="back-btn flex justify-between align-middle ml-[.25rem] p-[.25rem] pl-1 pr-3 w-[5rem] rounded-full bg-slate-100"
      >
        <ion-icon
          name="arrow-back-circle-outline"
          size="large"
          color="dark"
        ></ion-icon>
        <span class="">กลับ</span>
      </a>
      <span class="mt-1 text-white mr-[1rem] text-xl"
        >แก้ไขข้อมูลเจ้าของหอพัก</span
      >
    </div>
  </ion-toolbar>
</ion-header>
<ion-content [fullscreen]="true" class="profile-content minimal-style">
  <div class="background"></div>

  <div class="content-wrapper">
    <div class="profile-header bg-white/80 rounded-2xl mb-[4rem]">
      <div class="profile-upload-wrapper" (click)="presentPhotoOptions()">
        <div class="preview-container">
          <img
            [src]="imagePreview() || 'assets/icon.png'"
            class="profile-preview rounded-xl w-[15rem] h-[15rem] object-cover"
            *ngIf="imagePreview()"
            (error)="handleImageError()"
          />
          <div class="placeholder-preview" *ngIf="!imagePreview()">
            <ion-icon
              name="person-outline"
              class="text-5xl text-gray-300"
            ></ion-icon>
          </div>
        </div>
      </div>
      <div class="text-center text-lg font-bold mt-[1rem]">
        กดที่รูปเพื่อเปลี่ยนรูป
      </div>
    </div>

    <form
      [formGroup]="updateForm"
      (ngSubmit)="confirmUpdate()"
      class="info-section"
    >
      <ion-list lines="none" class="minimal-list">
        <ion-item
          class="border-b border-gray-300/80"
          style="margin-bottom: 0.5rem"
        >
          <ion-icon
            name="person-outline"
            slot="start"
            color="medium"
          ></ion-icon>
          <ion-label position="stacked">ชื่อผู้ใช้</ion-label>
          <ion-input
            type="text"
            placeholder="Username"
            formControlName="username"
          ></ion-input>
        </ion-item>

        <ion-item
          class="border-b border-gray-300/80"
          style="margin-bottom: 0.5rem"
        >
          <ion-icon
            name="person-circle-outline"
            slot="start"
            color="medium"
          ></ion-icon>
          <ion-label position="stacked">ชื่อจริง</ion-label>
          <ion-input
            type="text"
            placeholder="First Name"
            formControlName="first_name"
          ></ion-input>
        </ion-item>

        <ion-item
          class="border-b border-gray-300/80"
          style="margin-bottom: 0.5rem"
        >
          <ion-icon
            name="person-circle-outline"
            slot="start"
            color="medium"
          ></ion-icon>
          <ion-label position="stacked">นามสกุล</ion-label>
          <ion-input
            type="text"
            placeholder="Last Name"
            formControlName="last_name"
          ></ion-input>
        </ion-item>

        <ion-item
          class="border-b border-gray-300/80"
          style="margin-bottom: 0.5rem"
        >
          <ion-icon name="call-outline" slot="start" color="medium"></ion-icon>
          <ion-label position="stacked">เบอร์โทรศัพท์</ion-label>
          <ion-input
            type="tel"
            placeholder="0xx-xxx-xxxx"
            formControlName="phone_number"
          ></ion-input>
        </ion-item>
      </ion-list>

      <div class="save-section">
        <ion-button
          expand="block"
          fill="solid"
          class="save-btn"
          type="submit"
          [disabled]="updateForm.invalid"
        >
          บันทึกข้อมูล
        </ion-button>
      </div>
    </form>

    <div class="bottom-spacer"></div>
  </div>

  <ion-toast
    [isOpen]="succMsg() !== null"
    [message]="succMsg()"
    [duration]="5000"
    color="success"
    position="bottom"
    (didDismiss)="succMsg.set(null)"
  ></ion-toast>
  <ion-toast
    [isOpen]="errMsg() !== null"
    [message]="errMsg()"
    [duration]="5000"
    color="danger"
    position="bottom"
    (didDismiss)="errMsg.set(null)"
  ></ion-toast>

  <app-loading-ui *ngIf="isLoading()"></app-loading-ui>
</ion-content>
